<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | TheFaberTale</title>
  <link rel="icon" href="images/Fevicon.png">
  <meta name="description" content="Explore TheFaberTale's handcrafted furniture and décor items in full detail. Artisanal creations from Vadodara.">
  <meta name="robots" content="index, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header>
    <nav id="mainNavbar" class="navbar navbar-expand-lg fixed-top" aria-label="Primary navigation"></nav>
    <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="mobileNav" aria-labelledby="mobileNavLabel"></div>
  </header>
  <script src="js/critical.js"></script>

  <!-- Search Modal -->
  <div class="modal fade search-modal" id="searchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Search Products</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="search-input-wrap" style="position:relative;">
            <input type="text" id="searchInput" placeholder="Search by name, category, or tags..." aria-label="Search products">
            <iconify-icon class="search-icon" icon="mdi:magnify"></iconify-icon>
            <div id="searchResults"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <main>
    <!-- Enhanced Page Header -->
    <section class="page-header">
      <div class="container-fluid px-4 px-md-5">
        <p class="eyebrow" data-aos="fade-up">Portfolio</p>
        <h1 data-aos="fade-up" data-aos-delay="100">Our Gallery</h1>
        <p data-aos="fade-up" data-aos-delay="200">A visual exploration of our handcrafted furniture and décor collections. Click any image to view in detail.</p>
      </div>
    </section>

    <!-- Gallery Grid Section -->
    <section class="defaultPadding">
      <div class="container-fluid px-4 px-md-5">
        <!-- Dynamic Gallery Container -->
        <div class="gallery-grid" id="mainGalleryGrid">
          <!-- Images injected via JS -->
          <div class="text-center w-100 py-5" style="grid-column: 1 / -1; color: var(--grey);">
            <div class="spinner-border text-dark" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading gallery...</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <a href="#" class="back-to-top" id="backToTop" aria-label="Back to top"><iconify-icon icon="mdi:chevron-up"></iconify-icon></a>

  <footer id="footer" class="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="js/script.js"></script>
  <script src="js/product-manager.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        // Try paths to find products.json
        const paths = ["./products.json", "../products.json", "/products.json", "products.json"];
        let data = null;
        for (const path of paths) {
          try {
            const res = await fetch(path);
            if (res.ok) {
              data = await res.json();
              break;
            }
          } catch (e) { continue; }
        }

        const grid = document.getElementById("mainGalleryGrid");

        if (data && data.products) {
          // Extract all unique images
          let allImages = [];
          data.products.forEach(product => {
            if (product.images && Array.isArray(product.images)) {
              product.images.forEach(img => {
                if (!allImages.includes(img)) {
                  allImages.push({ src: img, alt: product.name });
                }
              });
            }
          });

          // Render html
          if (allImages.length > 0) {
            grid.innerHTML = allImages.map((imgObj, i) => `
              <div class="gallery-item" data-aos="zoom-in" data-aos-delay="${(i % 4) * 50}">
                <a href="${imgObj.src}" data-fancybox="full-gallery" data-caption="${imgObj.alt}">
                  <img src="${imgObj.src}" alt="${imgObj.alt}" loading="lazy">
                </a>
              </div>
            `).join("");
          } else {
            grid.innerHTML = `<p class="text-center w-100 py-5" style="grid-column: 1 / -1; color: var(--grey);">No images available at the moment.</p>`;
          }

          // Initialize Fancybox globally for the gallery
          Fancybox.bind('[data-fancybox="full-gallery"]', {
            compact: false,
            idle: 8000,
            animated: true,
            showClass: "f-fadeInUp",
            hideClass: "f-fadeOutDown",
            Toolbar: {
              display: {
                left: [],
                middle: ["infobar"],
                right: ["slideshow", "download", "thumbs", "close"],
              },
            }
          });
        } else {
          grid.innerHTML = `<p class="text-center w-100 py-5" style="grid-column: 1 / -1; color: var(--grey);">Unable to load gallery images.</p>`;
        }
      } catch (err) {
        console.error("Gallery Error:", err);
      }
    });
  </script>
</body>
</html>
