<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter Buttons - 5 Options</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --primary: #1a1a1a;
      --dark: #0a0a0a;
      --light: #e3fcf8;
      --accent: #2d9e89;
      --accent-hover: #258d7a;
      --grey: #6b6b6b;
      --grey-light: #b9c0bf;
      --white: #ffffff;
      --radius: 0; 
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      --font-main: 'Outfit', sans-serif;
    }

    /* ===== DEMO PAGE LAYOUT ===== */
    body {
      background-color: #f4f4f4;
      font-family: var(--font-main);
      color: var(--primary);
      padding: 4rem 2rem;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4rem;
    }

    .demo-section {
      width: 100%;
      max-width: 800px;
      background: var(--white);
      padding: 3rem;
      border: 1px solid #e0e0e0;
      position: relative;
    }

    .demo-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--grey-light);
    }

    .filter-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .filter-icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      transition: var(--transition);
      z-index: 2;
      position: relative;
    }

    .btn-text {
      z-index: 2;
      position: relative;
    }

    /* ==========================================================================
       1. NEO-BRUTALISM 
       ========================================================================== */
    .filter-neo {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 24px; background: var(--white);
      border: 2px solid var(--primary); color: var(--primary);
      font-weight: 600; font-size: 0.95rem; font-family: var(--font-main);
      cursor: pointer; box-shadow: 4px 4px 0px var(--primary);
      transition: all 0.15s ease-out;
    }
    .filter-neo:hover {
      background: var(--light); transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--primary);
    }
    .filter-neo.active {
      background: var(--accent); color: var(--white); border-color: var(--primary);
      transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--primary); 
    }

    /* ==========================================================================
       2. DARK MODE GLOW 
       ========================================================================== */
    .dark-section { background: var(--dark); color: var(--white); border-color: #333; }
    .dark-section .demo-title { border-color: #333; }
    
    .filter-glow {
      display: flex; align-items: center; gap: 8px; padding: 12px 24px;
      background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--grey-light); font-weight: 500; font-size: 0.95rem;
      font-family: var(--font-main); cursor: pointer; transition: var(--transition);
      position: relative; overflow: hidden;
    }
    .filter-glow:hover { background: rgba(255, 255, 255, 0.08); color: var(--white); }
    .filter-glow.active {
      background: rgba(45, 158, 137, 0.1); border-color: var(--accent); color: var(--white);
      box-shadow: 0 0 15px rgba(45, 158, 137, 0.3), inset 0 0 10px rgba(45, 158, 137, 0.2);
    }
    .filter-glow.active .filter-icon { stroke: var(--accent); }

    /* ==========================================================================
       3. THE "WIPE" REVEAL 
       ========================================================================== */
    .filter-wipe {
      display: flex; align-items: center; gap: 8px; padding: 12px 24px;
      background: transparent; border: 1px solid var(--primary);
      color: var(--primary); font-weight: 600; font-size: 0.95rem;
      font-family: var(--font-main); cursor: pointer; position: relative; overflow: hidden;
      transition: color var(--transition);
    }
    .filter-wipe::before {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 100%; height: 0%; background: var(--primary); transition: height var(--transition); z-index: 1;
    }
    .filter-wipe:hover { color: var(--white); }
    .filter-wipe:hover::before { height: 100%; }
    .filter-wipe.active { color: var(--white); border-color: var(--accent); }
    .filter-wipe.active::before { height: 100%; background: var(--accent); }

    /* ==========================================================================
       4. SHARP GLASSMORPHISM
       ========================================================================== */
    .glass-section {
      background-size: 40px 40px; background-color: #fafafa;
      background-image: linear-gradient(to right, #e8e8e8 1px, transparent 1px), linear-gradient(to bottom, #e8e8e8 1px, transparent 1px);
    }
    .filter-glass {
      display: flex; align-items: center; gap: 8px; padding: 12px 24px;
      background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); color: var(--grey);
      font-weight: 600; font-size: 0.95rem; font-family: var(--font-main);
      cursor: pointer; transition: var(--transition);
    }
    .filter-glass:hover { background: rgba(255, 255, 255, 0.7); color: var(--primary); transform: translateY(-2px); }
    .filter-glass.active {
      background: var(--primary); border: 1px solid var(--primary); color: var(--white);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15); transform: translateY(-2px);
    }

    /* ==========================================================================
       5. STACKED VISUAL CARD (IKEA-Style)
       ========================================================================== */
    .filter-group-opt5 { gap: 1.5rem; }
    
    .filter-visual-card {
      display: flex; flex-direction: column; align-items: center; width: 110px;
      padding: 20px 10px; background: var(--white); border: 1px solid var(--grey-light);
      border-radius: var(--radius); color: var(--primary); font-family: var(--font-main);
      cursor: pointer; transition: var(--transition);
    }
    
    .icon-box {
      display: flex; align-items: center; justify-content: center; width: 48px; height: 48px;
      background: var(--light); border-radius: var(--radius); margin-bottom: 12px;
      transition: var(--transition);
    }
    .icon-box .filter-icon { width: 24px; height: 24px; stroke: var(--accent); }
    
    .card-label { font-weight: 500; font-size: 0.9rem; text-align: center; transition: var(--transition); }
    
    .filter-visual-card:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); }
    
    .filter-visual-card.active {
      background: var(--primary); border-color: var(--primary); box-shadow: var(--shadow-md);
    }
    .filter-visual-card.active .card-label { color: var(--white); }
    .filter-visual-card.active .icon-box { background: rgba(255,255,255,0.1); }
    .filter-visual-card.active .icon-box .filter-icon { stroke: var(--white); }

  </style>
</head>

  <script src="js/gsap-loader.js"></script>
  <script src="js/script.js"></script>
  <script>
    // Handles the active state toggling for demonstration
    document.addEventListener('DOMContentLoaded', () => {
      const filterContainers = document.querySelectorAll('.filter-container');

      filterContainers.forEach(container => {
        const buttons = container.querySelectorAll('button');

        buttons.forEach(button => {
          button.addEventListener('click', () => {
            buttons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
          });
        });
      });
    });
  </script>
