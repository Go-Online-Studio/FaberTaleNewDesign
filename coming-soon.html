<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheFaberTale — Crafting Something Beautiful</title>
  <meta name="description" content="TheFaberTale is coming soon. Premium handcrafted furniture and decorative artifacts from Vadodara.">
  
  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

  <style>
    :root {
      --primary: #111111;
      --accent: #2d9e89;
      --accent-glow: rgba(45, 158, 137, 0.15);
      --light: #fafafa;
      --text-muted: #555555;
      --glass-bg: rgba(255, 255, 255, 0.82);
      --glass-border: rgba(255, 255, 255, 0.9);
      --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background-color: var(--light);
      color: var(--primary);
      overflow: hidden;
    }

    /* Full Screen Cinematic Background with Ken Burns Zoom */
    .bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      overflow: hidden;
    }

    .bg-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background-image: url('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&q=80&w=1920');
      background-position: center;
      background-size: cover;
      transform: scale(1.05);
      animation: kenBurns 25s ease-in-out infinite alternate;
    }

    @keyframes kenBurns {
      0% { transform: scale(1); }
      100% { transform: scale(1.12) translateY(-1%); }
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.2) 0%, rgba(250, 250, 250, 0.88) 100%);
    }

    /* Premium Glass Container Layout */
    .wrapper {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      width: 100%;
      max-width: 700px;
      padding: 65px 55px;
      text-align: center;
      position: relative;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.07);
      opacity: 0;
      transform: translateY(30px);
      animation: revealCard 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
    }

    @keyframes revealCard {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Subtle elegant accent corner borders */
    .glass-card::before, .glass-card::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      border: 1.5px solid var(--accent);
      pointer-events: none;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-card::before { top: 18px; left: 18px; border-right: 0; border-bottom: 0; }
    .glass-card::after { bottom: 18px; right: 18px; border-left: 0; border-top: 0; }
    
    .glass-card:hover::before { top: 24px; left: 24px; width: 36px; height: 36px; }
    .glass-card:hover::after { bottom: 24px; right: 24px; width: 36px; height: 36px; }

    /* Branding & Typography */
    .logo-container {
      margin-bottom: 30px;
    }

    .logo-sub {
      font-size: 11px;
      letter-spacing: 7px;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 12px;
      display: block;
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards 0.6s;
    }

    .logo-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(34px, 4.5vw, 48px);
      font-weight: 400;
      letter-spacing: 1px;
      line-height: 1.1;
      color: var(--primary);
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards 0.8s;
    }

    .logo-main span {
      display: block;
      font-size: clamp(20px, 2.8vw, 23px);
      opacity: 0.85;
      font-style: italic;
      margin-top: 4px;
      font-weight: 300;
    }

    .separator {
      width: 60px;
      height: 1px;
      background: rgba(0, 0, 0, 0.08);
      margin: 30px auto;
      position: relative;
      overflow: hidden;
    }
    .separator::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--accent);
      animation: lineSweep 3.5s infinite ease-in-out;
    }
    @keyframes lineSweep {
      50% { left: 100%; }
      100% { left: 100%; }
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 4vw, 36px);
      font-weight: 400;
      letter-spacing: 0.5px;
      line-height: 1.3;
      margin-bottom: 20px;
      color: var(--primary);
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards 1s;
    }

    .desc {
      font-size: clamp(13px, 1.3vw, 14px);
      line-height: 1.8;
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto 10px auto;
      font-weight: 300;
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards 1.2s;
    }

    /* Core Keyframe Animation Library */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Social Channels Styling (Kept clean and isolated in case they are un-commented later) */
    .footer-socials {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 35px;
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards 1.4s;
    }

    .social-link {
      color: rgba(0, 0, 0, 0.45);
      font-size: 18px;
      text-decoration: none;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .social-link:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(45, 158, 137, 0.04);
      transform: translateY(-3px);
    }

    /* Viewport Scaling */
    @media (max-width: 600px) {
      .glass-card {
        padding: 50px 24px;
      }
      .logo-main {
        font-size: 32px;
      }
      .headline {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <!-- Full Screen Animated Bright Background -->
  <div class="bg-container">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
  </div>

  <!-- Floating Interface Glass Container -->
  <div class="wrapper">
    <main class="glass-card">
      
      <header class="logo-container">
        <span class="logo-sub">Handcrafted Elegance</span>
        <h1 class="logo-main">
          द फेबरटेल
          <span>TheFaberTale</span>
        </h1>
      </header>

      <div class="separator"></div>

      <h2 class="headline">Crafting Something Beautiful</h2>
      
      <p class="desc">
        Our artisans are putting the final touches on our new digital boutique. Get ready to experience premium, handcrafted furniture that transforms spaces and tells a story.
      </p>

      <!-- Social Channels (Un-comment below if you'd like them displayed) -->
      <!--
      <footer class="footer-socials">
        <a href="#" class="social-link" aria-label="Instagram">
          <iconify-icon icon="mdi:instagram"></iconify-icon>
        </a>
        <a href="https://wa.me/919000000000" target="_blank" class="social-link" aria-label="WhatsApp">
          <iconify-icon icon="mdi:whatsapp"></iconify-icon>
        </a>
        <a href="#" class="social-link" aria-label="Facebook">
          <iconify-icon icon="mdi:facebook"></iconify-icon>
        </a>
      </footer>
      -->

    </main>
  </div>

</body>
</html>
