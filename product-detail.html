<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail | TheFaberTale</title>
  <meta name="description" content="View product details at TheFaberTale. Handcrafted furniture and décor artifacts.">
  <meta name="robots" content="index, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header>
    <nav id="mainNavbar" class="navbar navbar-expand-lg fixed-top" aria-label="Primary navigation"></nav>
    <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="mobileNav" aria-labelledby="mobileNavLabel"></div>
  </header>

  <script src="js/critical.js"></script>

  <!-- Search Modal -->
  <div class="modal fade search-modal" id="searchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Search Products</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="search-input-wrap" style="position:relative;">
            <input type="text" id="searchInput" placeholder="Search by name, category, or tags..." aria-label="Search products">
            <iconify-icon class="search-icon" icon="mdi:magnify"></iconify-icon>
            <div id="searchResults"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <main>
    <!-- Product Detail Section -->
    <section class="product-detail-section">
      <div class="container-fluid px-4 px-md-5">
        <!-- Breadcrumb -->
        <div class="breadcrumb-wrap" data-aos="fade-up">
          <a href="index.html">Home</a> / <a href="products.html">Products</a> / <span id="breadcrumbName">Loading...</span>
        </div>

        <div class="row">
          <!-- Gallery -->
          <div class="col-lg-7" data-aos="fade-right">
            <div class="product-detail-gallery">
              <div class="swiper product-gallery-swiper">
                <div class="swiper-wrapper" id="productGallery">
                  <!-- Dynamically loaded -->
                </div>
                <div class="swiper-pagination product-thumbs"></div>
              </div>
            </div>
          </div>

          <!-- Info -->
          <div class="col-lg-6" data-aos="fade-left">
            <div class="product-detail-info">
              <span class="product-category-tag" id="productCategory">Loading...</span>
              <h1 id="productTitle">Loading...</h1>
              <p class="product-description" id="productDescription">Loading product details...</p>

              <div class="product-tags" id="productTags">
                <!-- Dynamically loaded -->
              </div>

              <!-- Enquiry Button - Mobile (Modal) -->
              <button type="button" class="btn-enquiry d-table d-md-none" data-bs-toggle="modal" data-bs-target="#whatsappModal">
                <iconify-icon icon="mdi:whatsapp"></iconify-icon>
                <span>Quick Enquiry</span>
              </button>

              <!-- Enquiry Button - Desktop -->
              <div class="d-none d-md-table">
                <button id="desktopEnquiryBtn" class="btn-enquiry" type="button">
                  <iconify-icon icon="mdi:whatsapp"></iconify-icon>
                  <span>Quick Enquiry</span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Related Products -->
        <div class="related-products" id="related-products">
          <!-- Dynamically loaded by product-manager.js -->
        </div>
      </div>
    </section>

    <!-- WhatsApp Modal -->
    <div class="modal fade whatsapp-modal" id="whatsappModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">How would you like to reach us?</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="options">
              <button id="whatsappStandard" class="option" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 258" width="48" height="48">
                  <path fill="#25d366" d="M5.463 127.456c-.006 21.677 5.658 42.843 16.428 61.499L4.433 252.697l65.232-17.104a123 123 0 0 0 58.8 14.97h.054c67.815 0 123.018-55.183 123.047-123.01c.013-32.867-12.775-63.773-36.009-87.025c-23.23-23.25-54.125-36.061-87.043-36.076c-67.823 0-123.022 55.18-123.05 123.004"/>
                  <path fill="#fff" d="M96.678 74.148c-2.386-5.303-4.897-5.41-7.166-5.503c-1.858-.08-3.982-.074-6.104-.074c-2.124 0-5.575.799-8.492 3.984c-2.92 3.188-11.148 10.892-11.148 26.561s11.413 30.813 13.004 32.94c1.593 2.123 22.033 35.307 54.405 48.073c26.904 10.609 32.379 8.499 38.218 7.967c5.84-.53 18.844-7.702 21.497-15.139c2.655-7.436 2.655-13.81 1.859-15.142c-.796-1.327-2.92-2.124-6.105-3.716s-18.844-9.298-21.763-10.361c-2.92-1.062-5.043-1.592-7.167 1.597c-2.124 3.184-8.223 10.356-10.082 12.48c-1.857 2.129-3.716 2.394-6.9.801c-3.187-1.598-13.444-4.957-25.613-15.806c-9.468-8.442-15.86-18.867-17.718-22.056c-1.858-3.184-.199-4.91 1.398-6.497c1.431-1.427 3.186-3.719 4.78-5.578c1.588-1.86 2.118-3.187 3.18-5.311c1.063-2.126.531-3.986-.264-5.579c-.798-1.593-6.987-17.343-9.819-23.64"/>
                </svg>
                <span>WhatsApp</span>
              </button>
              <button id="whatsappBusiness" class="option" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 258" width="48" height="48">
                  <path fill="#25d366" d="M5.463 127.456c-.006 21.677 5.658 42.843 16.428 61.499L4.433 252.697l65.232-17.104a123 123 0 0 0 58.8 14.97h.054c67.815 0 123.018-55.183 123.047-123.01c.013-32.867-12.775-63.773-36.009-87.025c-23.23-23.25-54.125-36.061-87.043-36.076c-67.823 0-123.022 55.18-123.05 123.004"/>
                  <path fill="#fff" d="M96.678 74.148c-2.386-5.303-4.897-5.41-7.166-5.503c-1.858-.08-3.982-.074-6.104-.074c-2.124 0-5.575.799-8.492 3.984c-2.92 3.188-11.148 10.892-11.148 26.561s11.413 30.813 13.004 32.94c1.593 2.123 22.033 35.307 54.405 48.073c26.904 10.609 32.379 8.499 38.218 7.967c5.84-.53 18.844-7.702 21.497-15.139c2.655-7.436 2.655-13.81 1.859-15.142c-.796-1.327-2.92-2.124-6.105-3.716s-18.844-9.298-21.763-10.361c-2.92-1.062-5.043-1.592-7.167 1.597c-2.124 3.184-8.223 10.356-10.082 12.48c-1.857 2.129-3.716 2.394-6.9.801c-3.187-1.598-13.444-4.957-25.613-15.806c-9.468-8.442-15.86-18.867-17.718-22.056c-1.858-3.184-.199-4.91 1.398-6.497c1.431-1.427 3.186-3.719 4.78-5.578c1.588-1.86 2.118-3.187 3.18-5.311c1.063-2.126.531-3.986-.264-5.579c-.798-1.593-6.987-17.343-9.819-23.64"/>
                </svg>
                <span>WhatsApp Business</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <a href="#" class="back-to-top" id="backToTop" aria-label="Back to top">
    <iconify-icon icon="mdi:chevron-up"></iconify-icon>
  </a>

  <footer id="footer" class="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="js/script.js"></script>
  <script src="js/product-manager.js"></script>

  <script>
    // WhatsApp Enquiry Number (Matches CONFIG in script.js)
    const WHATSAPP_NUMBER = "917016738803";

    // Load product detail from URL params
    async function loadProductDetail() {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get("id");

      if (!productId) {
        document.getElementById("productTitle").textContent = "Product not found";
        return;
      }

      try {
        const paths = ["./products.json", "../products.json", "/products.json", "products.json"];
        let data = null;
        for (const path of paths) {
          try {
            const response = await fetch(path);
            if (response.ok) { data = await response.json(); break; }
          } catch (e) { continue; }
        }

        if (!data || !data.products) return;

        const product = data.products.find(p => p.id === productId);
        if (!product) {
          document.getElementById("productTitle").textContent = "Product not found";
          return;
        }

        // Update page
        document.title = `${product.name} | TheFaberTale`;
        document.getElementById("breadcrumbName").textContent = product.name;
        document.getElementById("productTitle").textContent = product.name;
        document.getElementById("productCategory").textContent = product.category;
        document.getElementById("productDescription").textContent = product.description;

        // Tags
        const tagsContainer = document.getElementById("productTags");
        tagsContainer.innerHTML = (product.tags || []).map(tag =>
          `<span class="tag-pill">${tag}</span>`
        ).join("");

        // Gallery
        const galleryWrapper = document.getElementById("productGallery");
        galleryWrapper.innerHTML = product.images.map(img =>
          `<div class="swiper-slide">
             <a href="${img}" data-fancybox="product-gallery" style="cursor: zoom-in; display: block;">
               <img src="${img}" alt="${product.name}">
             </a>
           </div>`
        ).join("");

        // Initialize Fancybox for the dynamically created links
        Fancybox.bind('[data-fancybox="product-gallery"]', {
          compact: false,
          idle: 8000,
          animated: true,
          showClass: "f-fadeInUp",
          hideClass: "f-fadeOutDown",
          Images: {
            zoom: false,
          },
          Toolbar: {
            display: {
              left: [],
              middle: ["infobar"],
              right: ["close"],
            },
          }
        });

        // Init Swiper
        const gallerySwiper = new Swiper('.product-gallery-swiper', {
          loop: true,
          speed: 600,
          spaceBetween: 0,
          pagination: {
            el: '.product-thumbs',
            clickable: true,
            renderBullet: function (index, className) {
              const imgSrc = product.images[index] || product.images[0];
              return `<span class="${className}" style="background:url('${imgSrc}') center/cover;"></span>`;
            }
          }
        });

        // WhatsApp Enquiry
        function constructWhatsAppMessage() {
          return `Hello, I'm interested in:\n\nProduct: ${product.name}\nCategory: ${product.category}\n\nPlease share more details.`;
        }

        function isMobileDevice() {
          return /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        const encodedMsg = () => encodeURIComponent(constructWhatsAppMessage());

        // Desktop button
        const desktopBtn = document.getElementById("desktopEnquiryBtn");
        if (desktopBtn) {
          desktopBtn.addEventListener("click", function () {
            const wpNum = (window.THE_FABER_TALE_CONFIG && window.THE_FABER_TALE_CONFIG.whatsappNumber) || "917016738803";
            const url = isMobileDevice()
              ? `https://api.whatsapp.com/send?phone=${wpNum}&text=${encodedMsg()}`
              : `https://web.whatsapp.com/send?phone=${wpNum}&text=${encodedMsg()}`;
            window.open(url, "_blank");
          });
        }

        // Mobile WhatsApp Standard
        document.getElementById("whatsappStandard").addEventListener("click", function () {
          const wpNum = (window.THE_FABER_TALE_CONFIG && window.THE_FABER_TALE_CONFIG.whatsappNumber) || "917016738803";
          const userAgent = navigator.userAgent || "";
          if (/android/i.test(userAgent)) {
            window.location.href = `intent://send?phone=${wpNum}&text=${encodedMsg()}#Intent;scheme=whatsapp;package=com.whatsapp;end`;
          } else {
            window.location.href = `https://wa.me/${wpNum}?text=${encodedMsg()}`;
          }
        });

        // Mobile WhatsApp Business
        document.getElementById("whatsappBusiness").addEventListener("click", function () {
          const wpNum = (window.THE_FABER_TALE_CONFIG && window.THE_FABER_TALE_CONFIG.whatsappNumber) || "917016738803";
          const userAgent = navigator.userAgent || "";
          if (/android/i.test(userAgent)) {
            window.location.href = `intent://send?phone=${wpNum}&text=${encodedMsg()}#Intent;scheme=whatsapp;package=com.whatsapp.w4b;end`;
          } else {
            window.location.href = `https://wa.me/${wpNum}?text=${encodedMsg()}`;
          }
        });

      } catch (error) {
        console.error("Error loading product detail:", error);
      }
    }

    document.addEventListener("DOMContentLoaded", loadProductDetail);
  </script>
</body>
</html>
